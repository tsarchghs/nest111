<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>POS Split Bill - Mobile</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased h-screen overflow-hidden">
<!-- Mobile Full Screen Modal -->
<div class="fixed inset-0 z-50 flex flex-col bg-white dark:bg-background-dark overflow-hidden">
<!-- Header -->
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-4 py-3 shrink-0">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl">splitscreen</span>
<h2 class="text-xl font-bold tracking-tight">Split Bill</h2>
</div>
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</header>
<!-- Tabs Navigation (Scrollable on small screens) -->
<div class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-800 shrink-0">
<div class="flex px-4 gap-6 overflow-x-auto no-scrollbar">
<button class="whitespace-nowrap flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 py-3 font-bold text-sm hover:text-primary transition-all">
                    Split by Person
                </button>
<button class="whitespace-nowrap flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 py-3 font-bold text-sm hover:text-primary transition-all">
                    Split by Item
                </button>
<button class="whitespace-nowrap flex flex-col items-center justify-center border-b-2 border-primary text-primary py-3 font-bold text-sm">
                    Custom Amount
                </button>
</div>
</div>
<!-- Main Content (Scrollable for summary, Keypad fixed at bottom) -->
<div class="flex flex-1 flex-col overflow-hidden">
<!-- Top Section: Summary -->
<div class="flex-1 overflow-y-auto p-4 space-y-4">
<div class="flex flex-col gap-1">
<div class="flex justify-between items-center text-sm">
<span class="text-slate-500 dark:text-slate-400">Total Bill</span>
<span class="font-bold">$96.60</span>
</div>
<div class="flex justify-between items-center text-sm">
<span class="text-slate-500 dark:text-slate-400">Remaining</span>
<span class="font-bold text-primary">$56.60</span>
</div>
</div>
<div class="bg-slate-100 dark:bg-slate-800/80 p-4 rounded-xl border border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center">
<span class="text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest mb-1">Entering Amount</span>
<span class="text-5xl font-black tracking-tight text-slate-900 dark:text-white">$40.00</span>
</div>
<div class="grid grid-cols-2 gap-2">
<button class="flex items-center justify-center bg-primary/10 text-primary border border-primary/20 rounded-lg py-2 font-bold text-xs hover:bg-primary/20">
                        Exact Half
                    </button>
<button class="flex items-center justify-center bg-primary/10 text-primary border border-primary/20 rounded-lg py-2 font-bold text-xs hover:bg-primary/20">
                        Pay Remaining
                    </button>
</div>
</div>
<!-- Numeric Keypad Section -->
<div class="bg-slate-50 dark:bg-slate-900/80 p-4 border-t border-slate-200 dark:border-slate-800 shrink-0">
<div class="grid grid-cols-3 gap-2 mb-4">
<button class="h-14 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-2xl font-bold active:bg-slate-100 dark:active:bg-slate-700">1</button>
<button class="h-14 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-2xl font-bold active:bg-slate-100 dark:active:bg-slate-700">2</button>
<button class="h-14 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-2xl font-bold active:bg-slate-100 dark:active:bg-slate-700">3</button>
<button class="h-14 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-2xl font-bold active:bg-slate-100 dark:active:bg-slate-700">4</button>
<button class="h-14 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-2xl font-bold active:bg-slate-100 dark:active:bg-slate-700">5</button>
<button class="h-14 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-2xl font-bold active:bg-slate-100 dark:active:bg-slate-700">6</button>
<button class="h-14 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-2xl font-bold active:bg-slate-100 dark:active:bg-slate-700">7</button>
<button class="h-14 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-2xl font-bold active:bg-slate-100 dark:active:bg-slate-700">8</button>
<button class="h-14 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-2xl font-bold active:bg-slate-100 dark:active:bg-slate-700">9</button>
<button class="h-14 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-2xl font-bold active:bg-slate-100 dark:active:bg-slate-700">.</button>
<button class="h-14 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-2xl font-bold active:bg-slate-100 dark:active:bg-slate-700">0</button>
<button class="h-14 bg-slate-200 dark:bg-slate-700/50 border border-slate-300 dark:border-slate-600 rounded-lg flex items-center justify-center active:bg-slate-300 dark:active:bg-slate-600">
<span class="material-symbols-outlined text-2xl">backspace</span>
</button>
</div>
<!-- Footer Actions -->
<div class="flex flex-col gap-2">
<button class="w-full bg-primary hover:bg-primary/90 text-white rounded-xl h-14 font-black text-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                        Charge $40.00
                    </button>
<button class="w-full bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-200 rounded-lg h-10 font-bold text-sm">
                        Cancel
                    </button>
</div>
</div>
</div>
</div>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body></html>
