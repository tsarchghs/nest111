<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment &amp; Tip Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#257bf4",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101722",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<!-- Background Layer (The underlying Payment & Checkout Screen) -->
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark blur-[2px] pointer-events-none">
<div class="layout-container flex h-full grow flex-col">
<div class="px-6 md:px-20 lg:px-40 flex flex-1 justify-center py-5">
<div class="layout-content-container flex flex-col max-w-[960px] flex-1">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-10 py-3">
<div class="flex items-center gap-4">
<div class="size-6 text-primary">
<span class="material-symbols-outlined">payments</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-tight">Payment &amp; Checkout</h2>
</div>
<button class="flex size-10 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<div class="p-8">
<div class="h-64 w-full bg-slate-200 dark:bg-slate-800/50 rounded-xl mb-6"></div>
<div class="h-10 w-1/3 bg-slate-200 dark:bg-slate-800/50 rounded-lg mb-4"></div>
<div class="h-4 w-full bg-slate-200 dark:bg-slate-800/50 rounded-lg mb-2"></div>
<div class="h-4 w-2/3 bg-slate-200 dark:bg-slate-800/50 rounded-lg mb-2"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Semi-transparent Overlay -->
<div class="fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-40"></div>
<!-- Mobile Bottom Sheet Modal -->
<div class="fixed inset-0 z-50 flex items-end justify-center">
<!-- Bottom Sheet Container -->
<div class="bg-background-light dark:bg-[#161f2c] w-full max-h-[96vh] rounded-t-3xl shadow-2xl border-t border-slate-200 dark:border-slate-800 overflow-y-auto flex flex-col">
<!-- Drag Handle -->
<div class="flex justify-center pt-3 pb-1">
<div class="w-12 h-1.5 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
<!-- Modal Header -->
<div class="flex items-center justify-between px-6 py-4">
<div class="flex flex-col">
<h2 class="text-xl font-bold tracking-tight">Add Tip</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Subtotal: $96.60</p>
</div>
<button class="p-2 bg-slate-100 dark:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</div>
<!-- Modal Content -->
<div class="p-6 space-y-6 flex-1 overflow-y-auto pb-32">
<!-- Toggle -->
<div class="flex p-1 bg-slate-100 dark:bg-slate-800 rounded-xl">
<button class="flex-1 py-2.5 text-sm font-semibold rounded-lg bg-white dark:bg-background-dark shadow-sm text-primary">Percentage</button>
<button class="flex-1 py-2.5 text-sm font-semibold rounded-lg text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200">Fixed Amount</button>
</div>
<!-- Quick Options Grid -->
<div class="grid grid-cols-4 gap-2">
<button class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-slate-200 dark:border-slate-800 hover:border-primary dark:hover:border-primary transition-all">
<span class="text-lg font-bold">5%</span>
<span class="text-[10px] text-slate-500 dark:text-slate-400">$4.83</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-slate-200 dark:border-slate-800 hover:border-primary dark:hover:border-primary transition-all">
<span class="text-lg font-bold">10%</span>
<span class="text-[10px] text-slate-500 dark:text-slate-400">$9.66</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-primary bg-primary/10 transition-all">
<span class="text-lg font-bold text-primary">15%</span>
<span class="text-[10px] text-primary/80 font-medium">$14.49</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-slate-200 dark:border-slate-800 hover:border-primary dark:hover:border-primary transition-all">
<span class="text-lg font-bold">20%</span>
<span class="text-[10px] text-slate-500 dark:text-slate-400">$19.32</span>
</button>
</div>
<!-- Custom Input Field -->
<div class="relative">
<label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1 ml-1">Custom Tip Amount</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-2xl font-bold text-slate-400">$</span>
<input class="w-full pl-10 pr-4 py-5 bg-slate-100 dark:bg-slate-800 border-none rounded-2xl text-3xl font-bold focus:ring-2 focus:ring-primary outline-none" readonly="" type="text" value="14.49"/>
</div>
</div>
<!-- Numeric Keypad - Large Buttons for Thumb Reach -->
<div class="grid grid-cols-3 gap-2">
<button class="h-16 flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 active:scale-95 transition-transform font-bold text-2xl">1</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 active:scale-95 transition-transform font-bold text-2xl">2</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 active:scale-95 transition-transform font-bold text-2xl">3</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 active:scale-95 transition-transform font-bold text-2xl">4</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 active:scale-95 transition-transform font-bold text-2xl">5</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 active:scale-95 transition-transform font-bold text-2xl">6</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 active:scale-95 transition-transform font-bold text-2xl">7</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 active:scale-95 transition-transform font-bold text-2xl">8</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 active:scale-95 transition-transform font-bold text-2xl">9</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 active:scale-95 transition-transform font-bold text-2xl">.</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-slate-100 dark:bg-slate-800 active:scale-95 transition-transform font-bold text-2xl">0</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-slate-200 dark:bg-slate-700 active:scale-95 transition-transform font-bold text-2xl">
<span class="material-symbols-outlined text-3xl">backspace</span>
</button>
</div>
</div>
<!-- Sticky Bottom Actions & Summary -->
<div class="absolute bottom-0 left-0 right-0 bg-background-light dark:bg-[#161f2c] border-t border-slate-200 dark:border-slate-800 p-6 space-y-4">
<div class="flex justify-between items-end">
<div class="flex flex-col">
<span class="text-xs text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest">Final Total</span>
<span class="text-3xl font-black text-primary">$111.09</span>
</div>
<div class="text-right flex flex-col items-end">
<span class="text-xs text-slate-500 dark:text-slate-400">Includes $14.49 tip</span>
<span class="text-sm font-medium">$96.60 + $14.49</span>
</div>
</div>
<button class="w-full py-5 rounded-2xl bg-primary text-white text-lg font-bold hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-3 shadow-xl shadow-primary/30">
                Apply Tip
                <span class="material-symbols-outlined text-2xl">check_circle</span>
</button>
</div>
</div>
</div>
</body></html>
